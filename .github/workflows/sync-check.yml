name: Check root/core sync
on:
  push:
    paths:
      - 'core/skills/setup-wizard/SKILL.md'
      - 'skills/setup-wizard/SKILL.md'
      - 'core/commands/setup-wizard.md'
      - 'commands/setup-wizard.md'
  pull_request:
    paths:
      - 'core/skills/setup-wizard/SKILL.md'
      - 'skills/setup-wizard/SKILL.md'
      - 'core/commands/setup-wizard.md'
      - 'commands/setup-wizard.md'

jobs:
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check setup-wizard skill is in sync
        run: |
          if ! diff -q core/skills/setup-wizard/SKILL.md skills/setup-wizard/SKILL.md > /dev/null 2>&1; then
            echo "::error::skills/setup-wizard/SKILL.md is out of sync with core/skills/setup-wizard/SKILL.md"
            echo ""
            echo "The root-level copy must mirror the core version."
            echo "Copy the core file: cp core/skills/setup-wizard/SKILL.md skills/setup-wizard/SKILL.md"
            diff core/skills/setup-wizard/SKILL.md skills/setup-wizard/SKILL.md || true
            exit 1
          fi
          echo "✓ setup-wizard skill in sync"
      - name: Check setup-wizard command is in sync
        run: |
          if ! diff -q core/commands/setup-wizard.md commands/setup-wizard.md > /dev/null 2>&1; then
            echo "::error::commands/setup-wizard.md is out of sync with core/commands/setup-wizard.md"
            echo ""
            echo "The root-level copy must mirror the core version."
            echo "Copy the core file: cp core/commands/setup-wizard.md commands/setup-wizard.md"
            diff core/commands/setup-wizard.md commands/setup-wizard.md || true
            exit 1
          fi
          echo "✓ setup-wizard command in sync"
